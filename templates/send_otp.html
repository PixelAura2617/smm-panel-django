{% extends "base.html" %}
{% block content %}

<div class="otp-container">
    <h2>Send OTP</h2>

    <form method="POST">
        {% csrf_token %}
        
        <input type="email" name="email" placeholder="Enter your email" required>
        
        <button type="submit">Send OTP</button>
    </form>
</div>

<style>
.otp-container {
    max-width: 400px;
    margin: 80px auto;
    background: #1e1e2f;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
    color: white;
}

.otp-container input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
}

.otp-container button {
    width: 100%;
    padding: 12px;
    background: #00a8ff;
    border: none;
    border-radius: 6px;
    color: white;
    font-weight: bold;
}
</style>

{% endblock %}
