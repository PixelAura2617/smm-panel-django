<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .register-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            background: #020617;
            color: white;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(45deg, #22c55e, #06b6d4);
            color: white;
            cursor: pointer;
        }

        a {
            color: #38bdf8;
        }

        .error {
            background: #ef4444;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="register-box">

    <h2>Register</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>
        <input type="=" name="referrl_code"velue="{{ ref }}
        <!-- 🔥 REFERRAL -->
        <input type="text" name="referral_code" placeholder="Referral Code (optional)">

        <button type="submit">Create Account</button>
    </form>

    <p style="margin-top:10px;">
        Already have an account? <a href="{% url 'login' %}">Login</a>
    </p>

</div>

</body>
</html>
