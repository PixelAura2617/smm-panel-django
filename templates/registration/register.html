<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .box {
            width: 340px;
            background: rgba(0,0,0,0.6);
            padding: 25px;
            border-radius: 10px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #00a8ff;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0097e6;
        }

        a {
            color: #00a8ff;
            text-decoration: none;
        }

        p {
            margin: 8px 0;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Register</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    {% if msg %}
        <p style="color:lightgreen;">{{ msg }}</p>
    {% endif %}

    {% if not otp_sent %}

    <!-- 🔹 STEP 1: REGISTER FORM -->
    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit" name="send_otp">SEND OTP</button>
    </form>

    {% else %}

    <!-- 🔹 STEP 2: OTP VERIFY -->
    <form method="POST">
        {% csrf_token %}

        <input type="hidden" name="verify_otp" value="1">
        <input type="hidden" name="email" value="{{ email }}">
        <input type="hidden" name="username" value="{{ username }}">
        <input type="hidden" name="password" value="{{ password }}">

        <input type="text" name="email_otp" placeholder="Enter Email OTP" required>

        <button type="submit">Verify & Create Account</button>
    </form>

    <!-- 🔥 RESEND -->
    <form method="POST" action="{% url 'resend_otp' %}">
        {% csrf_token %}
        <input type="hidden" name="email" value="{{ email }}">
        <button type="submit">Resend OTP</button>
    </form>

    {% endif %}

    <p>Already have account? <a href="{% url 'login' %}">Login</a></p>

</div>

</body>
</html>
